# 1XX1 Platform — Docker Compose
# Aşama 20 — Operasyon 20.2 (Operational Readiness)
#
# Kullanım:
#   docker compose up           → tüm servisler
#   docker compose up node1     → yalnızca tek düğüm
#   docker compose --profile monitoring up → observability dahil
#
# Profile'lar:
#   (varsayılan) → 3 node 1XX1 cluster
#   monitoring   → Prometheus + Grafana
#   dev          → hot-reload geliştirme modu

version: "3.9"

# ─── Ortak değişkenler ───────────────────────────────────────────────────────

x-common-env: &common-env
  NODE_ENV: production
  X1_PROTOCOL_VERSION: "1.0.0"
  X1_GOSSIP_FANOUT: "6"
  X1_GOSSIP_TTL: "8"
  X1_PULSE_INTERVAL_MS: "5000"
  X1_SNAPSHOT_INTERVAL_MS: "60000"
  X1_LOG_LEVEL: "info"
  X1_LOG_FORMAT: "json"

x-healthcheck: &healthcheck
  test: ["CMD", "curl", "-f", "http://localhost:${X1_API_PORT:-8080}/health"]
  interval: 10s
  timeout: 5s
  retries: 3
  start_period: 15s

# ─── Servisler ───────────────────────────────────────────────────────────────

services:

  # ── 1XX1 Node 1 (Bootstrap / İlk Validator) ──────────────────────────────
  node1:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: 1xx1-node:latest
    container_name: x1-node1
    hostname: x1-node1
    environment:
      <<: *common-env
      X1_NODE_ID: node1
      X1_API_PORT: "8080"
      X1_METRICS_PORT: "9090"
      X1_PEERS: "node2:8081,node3:8082"
      X1_IS_BOOTSTRAP: "true"
      X1_ELECTION_TIMEOUT_MIN_MS: "150"
      X1_ELECTION_TIMEOUT_MAX_MS: "300"
    ports:
      - "8080:8080"   # API
      - "9090:9090"   # Prometheus metrics
    volumes:
      - node1-data:/app/data
      - ./config:/app/config:ro
    networks:
      - x1-network
    healthcheck: *healthcheck
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ── 1XX1 Node 2 ───────────────────────────────────────────────────────────
  node2:
    image: 1xx1-node:latest
    container_name: x1-node2
    hostname: x1-node2
    environment:
      <<: *common-env
      X1_NODE_ID: node2
      X1_API_PORT: "8081"
      X1_METRICS_PORT: "9091"
      X1_PEERS: "node1:8080,node3:8082"
      X1_ELECTION_TIMEOUT_MIN_MS: "160"
      X1_ELECTION_TIMEOUT_MAX_MS: "320"
    ports:
      - "8081:8081"
      - "9091:9091"
    volumes:
      - node2-data:/app/data
      - ./config:/app/config:ro
    networks:
      - x1-network
    healthcheck: *healthcheck
    restart: unless-stopped
    depends_on:
      node1:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ── 1XX1 Node 3 ───────────────────────────────────────────────────────────
  node3:
    image: 1xx1-node:latest
    container_name: x1-node3
    hostname: x1-node3
    environment:
      <<: *common-env
      X1_NODE_ID: node3
      X1_API_PORT: "8082"
      X1_METRICS_PORT: "9092"
      X1_PEERS: "node1:8080,node2:8081"
      X1_ELECTION_TIMEOUT_MIN_MS: "170"
      X1_ELECTION_TIMEOUT_MAX_MS: "340"
    ports:
      - "8082:8082"
      - "9092:9092"
    volumes:
      - node3-data:/app/data
      - ./config:/app/config:ro
    networks:
      - x1-network
    healthcheck: *healthcheck
    restart: unless-stopped
    depends_on:
      node1:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ── Prometheus (monitoring profile) ──────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: x1-prometheus
    profiles: ["monitoring"]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-remote-write-receiver"
    ports:
      - "9080:9090"
    volumes:
      - ./ops/deployment/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - x1-network
    restart: unless-stopped

  # ── Grafana (monitoring profile) ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.0
    container_name: x1-grafana
    profiles: ["monitoring"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: changeme
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./ops/deployment/grafana-provisioning:/etc/grafana/provisioning:ro
    networks:
      - x1-network
    depends_on:
      - prometheus
    restart: unless-stopped

# ─── Ağlar ve Volumlar ───────────────────────────────────────────────────────

networks:
  x1-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

volumes:
  node1-data:
  node2-data:
  node3-data:
  prometheus-data:
  grafana-data:
